name: Fetch Landlord News
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install feedparser google-generativeai
      - run: python fetch_news.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - run: |
          git config user.name "bot"
          git config user.email "bot@news.com"
          git add news.json
          git diff --staged --quiet || (git commit -m "AI Update" && git push)
