name: Fetch Landlord News

on:
  schedule:
    - cron: '0 7 * * *'   # Runs every day at 7am UTC
  workflow_dispatch:        # Lets you also trigger it manually

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run news fetcher
        run: python fetch_news.py

      - name: Commit and push news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "Daily news update $(date -u +%Y-%m-%d)"
          git push
